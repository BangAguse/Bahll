  #     - POSTGRES_PASSWORD=${DB_PASSWORD:-bahll-secure-password}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - bahll-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U bahll"]
  #     interval: 10s
